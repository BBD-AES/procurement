server:
  servlet:
    context-path: /procurement

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

  http:
    serviceclient:
      bbd-user-service:
        base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081/user}
      bbd-item-service:
        base-url: ${ITEM_SERVICE_BASE_URL:http://localhost:8082}
      bbd-inventory-service:
        base-url: ${INVENTORY_SERVICE_BASE_URL:http://localhost:8083}
      bbd-procurement-service:
        base-url: ${PROCUREMENT_SERVICE_BASE_URL:http://localhost:8084}
      bbd-sales-service:
        base-url: ${SALES_SERVICE_BASE_URL:http://localhost:8085}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  application:
    name: procurement

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_ENDPOINT}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: Asia/Seoul

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: kafka.inwoohub.com:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: procurement-purchase
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

bbd:
  security:
    enabled: true
    permit-all-paths:
      - /actuator/health
      - /actuator/health/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs/**

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    config-url: /procurement/v3/api-docs/swagger-config
    url: /procurement/v3/api-docs

item:
  base-url: http://localhost:8082/item

sales:
  base-url: http://localhost:8085/sales