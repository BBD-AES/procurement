server:
  servlet:
    context-path: /procurement

spring:
  application:
    name: procurement

  threads:
    virtual:
      enabled: true # Java 21 Virtual Thread 사용

  datasource:
    url: ${DB_ENDPOINT}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: Asia/Seoul

# Swagger
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    url: /procurement/v3/api-docs
    config-url: /procurement/v3/api-docs/swagger-config

item:
  base-url: ${ITEM_SERVICE_BASE_URL:http://item:8080/item}

sales:
  base-url: ${SALES_SERVICE_BASE_URL:http://sales:8080/sales}

logging:
  level:
    root: info
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace